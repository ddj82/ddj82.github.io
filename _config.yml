# 블로그 기본 정보
title: "ddj82 블로그"
email: "azmzm@naver.com"
description: "개발과 공부를 기록하는 블로그입니다."

# 사이트 URL 설정 (GitHub Pages의 도메인 입력)
baseurl: ""  # e.g. /blog (서브 디렉토리 사용 시 입력, 보통 빈 값)
url: "https://ddj82.github.io"  # GitHub Pages 주소

# 소셜 정보 (필요 시 수정)
github_username: "ddj82"

# Alembic 테마 적용
remote_theme: "daviddarnes/alembic"

# 플러그인 설정 (GitHub Pages 호환 가능)
plugins:
  - jekyll-remote-theme  # 원격 테마 사용
  - jekyll-sitemap       # SEO 최적화 (사이트맵 생성)
  - jekyll-seo-tag       # SEO 메타 태그 추가
  - jekyll-feed          # RSS 피드 지원
  - jekyll-paginate      # 페이지네이션 지원
  - jekyll-archives      # 블로그 아카이브 기능

# 네비게이션 메뉴 설정
navigation_header:
  - title: "Home"
    url: "/"
  - title: "About"
    url: "/about/"
  - title: "Blog"
    url: "/blog/"
  - title: "Contact"
    url: "/contact/"

# 기본 설정
permalink: /:categories/:title/
paginate: 5  # 한 페이지당 표시할 포스트 수

# Markdown 및 코드 하이라이트 설정
markdown: kramdown
highlighter: rouge
